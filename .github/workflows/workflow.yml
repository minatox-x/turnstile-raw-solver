name: Turnstile Solver

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL to solve Turnstile for"
        required: true
        default: "https://deltastudy.site/verify"
      sitekey:
        description: "Cloudflare Turnstile sitekey"
        required: true
        default: "0x4AAAAAADnpjMgvQPlaYYog"

jobs:
  solve-turnstile:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtual environment
        run: python -m venv venv

      - name: Clone Turnstile-Solver-NEW
        run: git clone https://github.com/D3-vin/Turnstile-Solver-NEW

      - name: Install Python dependencies
        working-directory: Turnstile-Solver-NEW
        run: |
          for attempt in 1 2 3; do
            echo ">>> pip install -- attempt $attempt/3"
            source ../venv/bin/activate && pip install -r requirements.txt && break
            if [ $attempt -eq 3 ]; then echo "pip install failed after 3 attempts"; exit 1; fi
            echo "Retrying in 10s..."; sleep 10
          done

      - name: Install Chrome via patchright
        working-directory: Turnstile-Solver-NEW
        run: |
          for attempt in 1 2 3; do
            echo ">>> patchright install chrome -- attempt $attempt/3"
            source ../venv/bin/activate && patchright install chrome && break
            if [ $attempt -eq 3 ]; then echo "patchright install failed after 3 attempts"; exit 1; fi
            echo "Retrying in 15s..."; sleep 15
          done

      # api_solver.py is the real entrypoint (README: "Run the script ... python api_solver.py")
      - name: Start Turnstile Solver server
        working-directory: Turnstile-Solver-NEW
        run: |
          source ../venv/bin/activate
          nohup python api_solver.py --browser_type chrome --port 5072 > ../solver.log 2>&1 &
          echo $! > ../solver.pid
          echo "Waiting for server on port 5072..."
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:5072/" > /dev/null 2>&1; then
              echo "Server ready after ${i}s"; break
            fi
            if [ $i -eq 30 ]; then echo "Server failed to start"; cat ../solver.log; exit 1; fi
            sleep 1
          done

      - name: Write JSON parse helper
        run: |
          cat > parse_json.py << 'PYEOF'
          import sys, json, urllib.parse
          mode = sys.argv[1]
          raw = sys.stdin.read().strip()
          if mode == "encode":
            print(urllib.parse.quote(raw, safe=""))
          elif mode == "task_id":
            d = json.loads(raw)
            print(d.get("taskId", "") or d.get("task_id", ""))
          elif mode == "result":
            d = json.loads(raw)
            status = d.get("status", "")
            value = d.get("value", "")
            print(f"{status}|{value}")
          PYEOF

      # /turnstile?url=...&sitekey=... -> {"task_id": "..."}
      - name: Submit Turnstile task
        id: submit
        run: |
          ENCODED_URL=$(echo "${{ github.event.inputs.target_url }}" | python3 parse_json.py encode)
          SITEKEY="${{ github.event.inputs.sitekey }}"
          TASK_ID=""

          for attempt in 1 2 3; do
            echo ">>> /turnstile attempt $attempt/3"
            RESPONSE=$(curl -sf "http://127.0.0.1:5072/turnstile?url=${ENCODED_URL}&sitekey=${SITEKEY}" --max-time 30 || true)
            echo "Response: $RESPONSE"

            if [ -n "$RESPONSE" ]; then
              TASK_ID=$(echo "$RESPONSE" | python3 parse_json.py task_id || true)
            fi

            if [ -n "$TASK_ID" ] && [ "$TASK_ID" != "null" ]; then
              echo "Task submitted -- taskId: $TASK_ID"
              echo "task_id=$TASK_ID" >> $GITHUB_OUTPUT
              break
            fi

            if [ $attempt -eq 3 ]; then echo "Failed to submit after 3 attempts"; cat solver.log; exit 1; fi
            echo "Attempt $attempt failed -- retrying in 5s..."; sleep 5
          done

      # /result?id=... -> {"status":"processing"} | {"status":"ready","value":"<token>"} | {"status":"fail","value":"..."}
      - name: Poll for result token
        id: poll
        run: |
          TASK_ID="${{ steps.submit.outputs.task_id }}"
          echo "Polling /result?id=$TASK_ID every 10s up to 30s..."
          TOKEN=""

          for poll in 1 2 3; do
            echo "--- Poll $poll/3 ---"
            RESPONSE=$(curl -sf "http://127.0.0.1:5072/result?id=${TASK_ID}" --max-time 15 || true)
            echo "Response: $RESPONSE"

            STATUS=""
            VALUE=""
            if [ -n "$RESPONSE" ]; then
              PARSED=$(echo "$RESPONSE" | python3 parse_json.py result || true)
              STATUS=$(echo "$PARSED" | cut -d'|' -f1)
              VALUE=$(echo "$PARSED" | cut -d'|' -f2-)
            fi

            if [ "$STATUS" = "ready" ]; then
              TOKEN="$VALUE"
              echo "Token received: $TOKEN"
              echo "token=$TOKEN" >> $GITHUB_OUTPUT
              break
            elif [ "$STATUS" = "fail" ]; then
              echo "Solver reported failure: $VALUE"
              cat solver.log
              exit 1
            fi

            if [ $poll -eq 3 ]; then echo "Still processing after 3 polls (30s) -- giving up"; cat solver.log; exit 1; fi
            echo "Status: $STATUS -- waiting 10s before next poll..."; sleep 10
          done

      - name: Action complete
        run: |
          echo "=========================================="
          echo "  Turnstile solved successfully!"
          echo "  task_id : ${{ steps.submit.outputs.task_id }}"
          echo "  token   : ${{ steps.poll.outputs.token }}"
          echo "=========================================="

      - name: Print solver logs
        if: always()
        run: cat solver.log || true

      - name: Stop solver server
        if: always()
        run: |
          if [ -f solver.pid ]; then kill "$(cat solver.pid)" 2>/dev/null || true; fi
